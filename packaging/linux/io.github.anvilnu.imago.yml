id: io.github.anvilnu.imago
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: imago

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=cups
  - --device=dri

modules:
  - name: imago
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/imago /app/bin
      - cp -a imago/. /app/lib/imago/
      - ln -s /app/lib/imago/Imago /app/bin/imago
      - install -Dm644 io.github.anvilnu.imago.desktop /app/share/applications/io.github.anvilnu.imago.desktop
      - install -Dm644 io.github.anvilnu.imago.metainfo.xml /app/share/metainfo/io.github.anvilnu.imago.metainfo.xml
      - install -Dm644 imago.png /app/share/icons/hicolor/64x64/apps/io.github.anvilnu.imago.png
    sources:
      - type: dir
        path: ../../dist/Imago
        dest: imago
      - type: file
        path: io.github.anvilnu.imago.desktop
      - type: file
        path: ../../build/linux-metadata/io.github.anvilnu.imago.metainfo.xml
      - type: file
        path: ../../icons/imago.png
